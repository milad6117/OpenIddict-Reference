version: "3.9"

services:

  sqlserver:

    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: openiddict-sqlserver

    restart: unless-stopped

    env_file:
      - .env

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_PASSWORD}

    ports:
      - "1433:1433"

    volumes:
      - sqlserver-data:/var/opt/mssql

    networks:
      - openiddict-network



  openiddict:

    build:
      context: .
      dockerfile: Dockerfile

    image: openiddict-reference:1.0

    container_name: openiddict-reference

    restart: unless-stopped

    depends_on:
      - sqlserver


    env_file:
      - .env

    environment:

      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}

      ConnectionStrings__DefaultConnection: >
        Server=sqlserver;
        Database=${SQL_DATABASE};
        User Id=sa;
        Password=${SQL_PASSWORD};
        TrustServerCertificate=True;

      OpenIddict__Issuer: ${OPENIDDICT_ISSUER}

    ports:
      - "5005:8080"

    networks:
      - openiddict-network



volumes:

  sqlserver-data:



networks:

  openiddict-network:
    driver: bridge