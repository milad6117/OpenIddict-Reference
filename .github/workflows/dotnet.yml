name: .NET CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore OpenIddict.ReferenceServer.sln

      - name: Build Solution
        run: dotnet build OpenIddict.ReferenceServer.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish OpenIddict.Reference.Api/OpenIddict.Reference.Api.csproj --configuration Release --no-build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish
          path: OpenIddict.Reference.Api/bin/Release/net10.0/publish